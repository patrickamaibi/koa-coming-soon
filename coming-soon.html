<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOA Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0f0d;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            background-image: url('images/KOA22.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                rgba(8,16,11,0.80) 0%,
                rgba(8,16,11,0.65) 50%,
                rgba(8,16,11,0.92) 100%);
        }

        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            padding: 3rem 4rem;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .wordmark {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #fff;
        }

        .wordmark span { color: #A8C5B0; }

        .est {
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.28);
            font-weight: 300;
        }

        /* ── Center ── */
        .center {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 760px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #A8C5B0;
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        .eyebrow-text {
            font-size: 0.65rem;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: #A8C5B0;
            font-weight: 400;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.6rem, 5.5vw, 4.8rem);
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: 0.01em;
            color: #fff;
            margin-bottom: 1.6rem;
        }

        h1 em {
            font-style: italic;
            color: #A8C5B0;
        }

        .rule {
            width: 48px;
            height: 1px;
            background: rgba(168,197,176,0.4);
            margin-bottom: 1.6rem;
        }

        .tagline {
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.1em;
        }

        /* ── Countdown ── */
        .countdown {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            margin-top: 3.8rem;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* Flip card shell */
        .flip-card {
            position: relative;
            width: 108px;
            height: 128px;
        }

        /* Static halves */
        .flip-top, .flip-bottom {
            position: absolute;
            left: 0; right: 0;
            height: 50%;
            overflow: hidden;
            background: rgba(18,30,23,0.75);
            border: 1px solid rgba(168,197,176,0.10);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .flip-top {
            top: 0;
            border-radius: 6px 6px 0 0;
            border-bottom: 1px solid rgba(0,0,0,0.5);
            display: flex; align-items: flex-end; justify-content: center;
        }

        .flip-bottom {
            bottom: 0;
            border-radius: 0 0 6px 6px;
            display: flex; align-items: flex-start; justify-content: center;
        }

        .flip-top .num   { transform: translateY(50%); }
        .flip-bottom .num { transform: translateY(-50%); }

        .num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5.6rem;
            font-weight: 300;
            color: #fff;
            line-height: 1;
            letter-spacing: 0.02em;
            user-select: none;
        }

        /* Animated flap */
        .flip-flap {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            transform-origin: bottom center;
            backface-visibility: hidden;
            border-radius: 6px 6px 0 0;
            background: rgba(22,38,28,0.85);
            border: 1px solid rgba(168,197,176,0.12);
            border-bottom: 1px solid rgba(0,0,0,0.5);
            display: flex; align-items: flex-end; justify-content: center;
            overflow: hidden;
            pointer-events: none;
            z-index: 2;
        }

        .flip-flap .num { transform: translateY(50%); }

        .flip-flap.go {
            animation: flipDown 0.45s cubic-bezier(0.45, 0.03, 0.52, 0.96) forwards;
        }

        @keyframes flipDown {
            0%   { transform: rotateX(0deg); box-shadow: none; }
            50%  { box-shadow: 0 8px 24px rgba(0,0,0,0.45); }
            100% { transform: rotateX(-90deg); box-shadow: none; }
        }

        /* Separator */
        .sep {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.8rem;
            font-weight: 300;
            color: rgba(168,197,176,0.25);
            line-height: 1;
            padding-bottom: 32px;
            user-select: none;
            align-self: flex-end;
        }

        .time-label {
            font-size: 0.56rem;
            letter-spacing: 0.34em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            font-weight: 300;
        }

        /* ── Footer ── */
        footer {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .footer-left, .footer-right {
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.18);
            font-weight: 300;
            line-height: 1.9;
        }

        .footer-right { text-align: right; }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            .page { padding: 1.8rem; }
            .est { display: none; }
            h1 { font-size: 2.4rem; }
            .flip-card { width: 72px; height: 86px; }
            .num { font-size: 3.6rem; }
            .sep { font-size: 3rem; padding-bottom: 20px; }
            .countdown { gap: 0.3rem; }
            .footer-right { display: none; }
        }
    </style>
</head>
<body>

<div class="bg"></div>

<div class="page">

    <header>
        <div class="wordmark">KOA <span>Engineering</span></div>
        <div class="est">Est. 2019</div>
    </header>

    <div class="center">
        <div class="eyebrow">
            <div class="dot"></div>
            <span class="eyebrow-text">Coming Soon</span>
        </div>

        <h1>Pushing Boundaries.<br><em>Building Futures.</em></h1>

        <div class="rule"></div>

        <p class="tagline">Structural &nbsp;·&nbsp; Civil &nbsp;·&nbsp; Highway &nbsp;·&nbsp; Environmental</p>

        <div class="countdown" id="countdown">
            <div class="time-unit">
                <div class="flip-card" id="card-d">
                    <div class="flip-top"><span class="num" id="top-d">00</span></div>
                    <div class="flip-bottom"><span class="num" id="bot-d">00</span></div>
                    <div class="flip-flap" id="flap-d"><span class="num" id="flap-num-d">00</span></div>
                </div>
                <div class="time-label">Days</div>
            </div>

            <div class="sep">:</div>

            <div class="time-unit">
                <div class="flip-card" id="card-h">
                    <div class="flip-top"><span class="num" id="top-h">00</span></div>
                    <div class="flip-bottom"><span class="num" id="bot-h">00</span></div>
                    <div class="flip-flap" id="flap-h"><span class="num" id="flap-num-h">00</span></div>
                </div>
                <div class="time-label">Hours</div>
            </div>

            <div class="sep">:</div>

            <div class="time-unit">
                <div class="flip-card" id="card-m">
                    <div class="flip-top"><span class="num" id="top-m">00</span></div>
                    <div class="flip-bottom"><span class="num" id="bot-m">00</span></div>
                    <div class="flip-flap" id="flap-m"><span class="num" id="flap-num-m">00</span></div>
                </div>
                <div class="time-label">Minutes</div>
            </div>

            <div class="sep">:</div>

            <div class="time-unit">
                <div class="flip-card" id="card-s">
                    <div class="flip-top"><span class="num" id="top-s">00</span></div>
                    <div class="flip-bottom"><span class="num" id="bot-s">00</span></div>
                    <div class="flip-flap" id="flap-s"><span class="num" id="flap-num-s">00</span></div>
                </div>
                <div class="time-label">Seconds</div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-left">
            Nigeria<br>
            info@koaengineering.com
        </div>
        <div class="footer-right">
            © 2025 KOA Engineering Ltd<br>
        </div>
    </footer>

</div>

<script>
    const launch = new Date('2026-07-15T00:00:00');

    const prev = { d: null, h: null, m: null, s: null };

    function pad(n) { return String(n).padStart(2, '0'); }

    function flip(key, newVal) {
        const top     = document.getElementById('top-' + key);
        const bot     = document.getElementById('bot-' + key);
        const flap    = document.getElementById('flap-' + key);
        const flapNum = document.getElementById('flap-num-' + key);

        // Flap shows the OLD value flying away
        flapNum.textContent = top.textContent;
        flap.classList.remove('go');
        void flap.offsetWidth; // reflow to restart animation
        flap.classList.add('go');

        // Update static faces immediately
        top.textContent = newVal;
        bot.textContent = newVal;
    }

    function tick() {
        const gap = launch - Date.now();
        if (gap <= 0) {
            document.getElementById('countdown').style.opacity = '0.3';
            return;
        }

        const d = Math.floor(gap / 86400000);
        const h = Math.floor((gap % 86400000) / 3600000);
        const m = Math.floor((gap % 3600000) / 60000);
        const s = Math.floor((gap % 60000) / 1000);

        const vals = { d, h, m, s };

        for (const key of ['d','h','m','s']) {
            const str = pad(vals[key]);
            if (str !== prev[key]) {
                flip(key, str);
                prev[key] = str;
            }
        }
    }

    setInterval(tick, 1000);
    tick();
</script>

</body>
</html>
